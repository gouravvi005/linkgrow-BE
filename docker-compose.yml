version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: linkgrow_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: linkgrow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: linkgrow_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: linkgrow_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@linkgrow.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  mailpit:
    image: axllent/mailpit
    container_name: linkgrow_mailpit
    restart: always
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkgrow_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/linkgrow?schema=public
      - REDIS_URL=redis://redis:6379/0
      - BETTER_AUTH_SECRET=super-secret-better-auth-key-32-chars-long
      - BETTER_AUTH_URL=http://localhost:3000
      - RESEND_API_KEY=re_mock_api_key_for_development
      - EMAIL_FROM=noreply@linkgrow.com
      - CLOUDFLARE_R2_ACCESS_KEY_ID=mock_r2_access_key
      - CLOUDFLARE_R2_SECRET_ACCESS_KEY=mock_r2_secret_key
      - CLOUDFLARE_R2_BUCKET_NAME=linkgrow-media-dev
      - CLOUDFLARE_R2_ENDPOINT=https://mock-account-id.r2.cloudflarestorage.com
      - CLOUDFLARE_R2_PUBLIC_URL=http://localhost:3000/static
      - STRIPE_SECRET_KEY=sk_test_mock_stripe_key
      - STRIPE_WEBHOOK_SECRET=whsec_mock_webhook_secret
      - RAZORPAY_KEY_ID=rzp_test_mock_key
      - RAZORPAY_KEY_SECRET=rzp_mock_secret
      - RAZORPAY_WEBHOOK_SECRET=rzp_mock_webhook_secret
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
